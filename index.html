const orbitCanvas = document.getElementById('orbit-canvas');
const orbitCtx = orbitCanvas.getContext('2d');
let orbitDpr = 1;

const ORBIT_INNER_FRAC = 0.30;
const ORBIT_OUTER_FRAC = 0.92;
// Decorative angular span, not a real time window: at the true angular
// velocity (one lap per 24h) any real-time tail is sub-pixel. 0.35 rad
// represents the last ~80 minutes of local time.
const ORBIT_TRAIL_SPAN = 0.35;
const ORBIT_TRAIL_SAMPLES = 24;

function isOrbitViewActive() {
  const el = document.getElementById('view-orbit');
  return !!el && el.classList.contains('active');
}

function hexToRgba(hex, alpha) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${alpha.toFixed(3)})`;
}

// Minutes east of UTC for `tz` at the given instant (handles DST correctly,
// since it reads the zone's actual current wall-clock offset rather than a
// static lookup table).
function utcOffsetMinutes(tz, at) {
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour12: false,
    year: 'numeric', month: 'numeric', day: 'numeric', hour: 'numeric', minute: 'numeric',
  });
  const p = fmt.formatToParts(at);
  const get = (t) => parseInt(p.find(x => x.type === t).value, 10);
  const asUTC = Date.UTC(get('year'), get('month') - 1, get('day'), get('hour') % 24, get('minute'));
  // Round: the formatted wall-clock is truncated to the minute while
  // at.getTime() carries seconds — the raw quotient is fractional, which
  // leaks into tooltip text ("UTC-7:0.52…") if not rounded.
  return Math.round((asUTC - at.getTime()) / 60000);
}

// Orbit angle for a zone at a given instant. Noon local solar time -> angle 0
// (sun-facing side, matching drawSunGlow's fixed position); midnight -> PI
// (opposite side). Matches projectCore's convention: angle 0 = +X, depth 0.
function orbitAngleAt(tz, at) {
  const fmt = new Intl.DateTimeFormat('en-GB', {
    timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  });
  const p = fmt.formatToParts(at);
  const h = parseInt(p.find(x => x.type === 'hour').value, 10);
  const m = parseInt(p.find(x => x.type === 'minute').value, 10);
  const s = parseInt(p.find(x => x.type === 'second').value, 10);
  const hourFrac = h + m / 60 + s / 3600;
  return ((hourFrac - 12) / 24) * Math.PI * 2;
}

// Ports Skai-demo's projectCore: a top-down orbital position tilted into a
// pseudo-3D view. angle 0 = +X (toward the sun marker), depth > 0 = nearer
// the viewer (drawn in front), depth < 0 = farther (drawn behind).
function projectCore(cx, cy, cam, orbitPx, angle) {
  const wx = orbitPx * Math.cos(angle);
  const wz = orbitPx * Math.sin(angle);
  return { x: cx + wx * cam.zoom, y: cy + wz * cam.zoom * cam.tiltY, depth: wz };
}

// Ports Skai-demo's shadeSphere, parameterized by an explicit light direction
// instead of "toward canvas center" (Earth sits at center here, not the sun).
function shadeSphereDirectional(g, x, y, radius, lightDx, lightDy) {
  if (radius < 1.2) return;
  const litx = x + lightDx * radius, lity = y + lightDy * radius;
  const darkx = x - lightDx * radius, darky = y - lightDy * radius;
  let grad = g.createLinearGradient(litx, lity, darkx, darky);
  grad.addColorStop(0,    'rgba(0,0,0,0)');
  grad.addColorStop(0.45, 'rgba(0,0,0,0)');
  grad.addColorStop(1,    'rgba(0,0,0,0.86)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(x, y, radius, 0, Math.PI * 2); g.fill();

  const hix = x + lightDx * radius * 0.45, hiy = y + lightDy * radius * 0.45;
  grad = g.createRadialGradient(hix, hiy, 0, hix, hiy, radius * 1.2);
  grad.addColorStop(0, 'rgba(255,255,255,0.22)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(x, y, radius, 0, Math.PI * 2); g.fill();
}

function strokeOrbitRing(g, cx, cy, cam, orbitPx, opts = {}) {
  const { dashed = false, strokeStyle = 'rgba(51,68,102,0.4)', lineWidth = 1 } = opts;
  const seg = 96;
  g.beginPath();
  for (let i = 0; i <= seg; i++) {
    const p = projectCore(cx, cy, cam, orbitPx, (i / seg) * Math.PI * 2);
    if (i === 0) g.moveTo(p.x, p.y); else g.lineTo(p.x, p.y);
  }
  g.lineWidth = lineWidth;
  if (dashed) g.setLineDash([4 * lineWidth, 5 * lineWidth]);
  g.strokeStyle = strokeStyle;
  g.stroke();
  if (dashed) g.setLineDash([]);
}

function drawSunGlow(g, cx, cy, cam, maxR) {
  const p = projectCore(cx, cy, cam, maxR * 1.05, 0); // "noon" direction, just past the outer ring
  const r = maxR * 0.22;
  g.save();
  g.globalCompositeOperation = 'lighter';
  const grad = g.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
  grad.addColorStop(0,   'rgba(255,220,130,0.55)');
  grad.addColorStop(0.5, 'rgba(255,170,60,0.18)');
  grad.addColorStop(1,   'rgba(255,120,30,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(p.x, p.y, r, 0, Math.PI * 2); g.fill();
  g.restore();
}

function drawEarth(g, cx, cy, r) {
  const grad = g.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  grad.addColorStop(0, '#2a5a8a');
  grad.addColorStop(1, '#0f2745');
  g.fillStyle = grad;
  g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.fill();
  shadeSphereDirectional(g, cx, cy, r, 1, 0); // lit toward the sun marker (+X)

  // Soft atmosphere rim, matching the Globe view's technique
  g.save();
  g.globalCompositeOperation = 'lighter';
  const aGrad = g.createRadialGradient(cx, cy, r * 0.85, cx, cy, r * 1.08);
  aGrad.addColorStop(0, 'rgba(100,180,255,0)');
  aGrad.addColorStop(1, 'rgba(100,180,255,0.16)');
  g.fillStyle = aGrad;
  g.beginPath(); g.arc(cx, cy, r * 1.08, 0, Math.PI * 2); g.fill();
  g.restore();
}

function drawCityTrail(g, cx, cy, cam, city, planetR) {
  const pts = [];
  for (let i = 0; i < ORBIT_TRAIL_SAMPLES; i++) {
    const a = city.angle - (1 - i / (ORBIT_TRAIL_SAMPLES - 1)) * ORBIT_TRAIL_SPAN;
    pts.push(projectCore(cx, cy, cam, city.orbitPx, a));
  }
  drawTaperedTrail(g, pts, city.color, planetR * 1.2, 0.4);
}

function drawCityLabel(g, pos, planetR, city) {
  // All sizes in device px: the canvas has no dpr transform, so CSS-px font
  // sizes would render half-size on retina displays.
  const s = orbitDpr;
  const timeStr = `${city.t.h}:${city.t.m}`;
  g.textAlign = 'center';
  g.textBaseline = 'alphabetic';
  const y = pos.y - planetR - 8 * s;

  g.font = `700 ${11 * s}px "Segoe UI", sans-serif`;
  g.fillStyle = 'rgba(0,0,0,0.7)';
  g.fillText(timeStr, pos.x + s, y + s);
  g.fillStyle = city.isDay ? '#fde68a' : '#c7d2fe';
  g.fillText(timeStr, pos.x, y);

  g.font = `${9 * s}px "Segoe UI", sans-serif`;
  g.fillStyle = 'rgba(0,0,0,0.7)';
  g.fillText(city.zone.label, pos.x + s, y + 13 * s + s);
  g.fillStyle = '#94a3b8';
  g.fillText(city.zone.label, pos.x, y + 13 * s);
  g.textAlign = 'left';
}

function drawOrbitBodies(g, cx, cy, cam, maxR, earthR, cities) {
  const n = cities.length;
  const planetR = maxR * 0.045;
  const depths = cities.map(city => projectCore(cx, cy, cam, city.orbitPx, city.angle).depth);
  const order = cities.map((_, i) => i);
  for (let i = 1; i < n; i++) { // insertion sort: far/back first
    const k = order[i], dk = depths[k]; let j = i - 1;
    while (j >= 0 && depths[order[j]] > dk) { order[j + 1] = order[j]; j--; }
    order[j + 1] = k;
  }

  let earthDrawn = false;
  for (let idx = 0; idx < n; idx++) {
    const i = order[idx];
    const city = cities[i];
    if (!earthDrawn && depths[i] >= 0) { drawEarth(g, cx, cy, earthR); earthDrawn = true; }

    if (Settings.get('trails') && !effectiveReduceMotion()) drawCityTrail(g, cx, cy, cam, city, planetR);

    const pos = projectCore(cx, cy, cam, city.orbitPx, city.angle);
    g.fillStyle = city.color;
    g.beginPath(); g.arc(pos.x, pos.y, planetR, 0, Math.PI * 2); g.fill();
    shadeSphereDirectional(g, pos.x, pos.y, planetR, 1, 0);

    if (Settings.get('orbitLabels')) drawCityLabel(g, pos, planetR, city);
  }
  if (!earthDrawn) drawEarth(g, cx, cy, earthR);
}

function orderedZonesByOffset(at) {
  return ZONES
    .map(zone => ({ zone, offset: utcOffsetMinutes(zone.tz, at) }))
    .sort((a, b) => a.offset - b.offset)
    .map(({ zone }) => zone);
}

function buildOrbitCities(maxR, at) {
  const ordered = orderedZonesByOffset(at);
  const n = ordered.length;
  return ordered.map((zone, i) => {
    const frac = n === 1 ? 0 : i / (n - 1);
    const orbitPx = maxR * (ORBIT_INNER_FRAC + (ORBIT_OUTER_FRAC - ORBIT_INNER_FRAC) * frac);
    const angle = orbitAngleAt(zone.tz, at);
    const t = getTimeParts(zone.tz);
    return { zone, orbitPx, angle, t, isDay: t.isDay, color: t.isDay ? '#facc15' : '#6366f1' };
  });
}

function drawOrbit(now) {
  orbitDpr = sizeCanvas(orbitCanvas);
  const w = orbitCanvas.width, h = orbitCanvas.height;
  orbitCtx.clearRect(0, 0, w, h);
  if (w === 0 || h === 0) return;

  const maxR = Math.min(w, h) * 0.42;
  const cx = w / 2, cy = h / 2;
  const cam = { zoom: 1, tiltY: 0.55 };
  const earthR = maxR * 0.14;
  const at = Clock.now();
  const cities = buildOrbitCities(maxR, at);

  if (Settings.get('orbitRings')) {
    cities.forEach(city => strokeOrbitRing(orbitCtx, cx, cy, cam, city.orbitPx, { lineWidth: orbitDpr }));
  }
  drawSunGlow(orbitCtx, cx, cy, cam, maxR);
  drawOrbitBodies(orbitCtx, cx, cy, cam, maxR, earthR, cities);
}

function orbitAnimActive() {
  return isOrbitViewActive() && !effectiveReduceMotion();
}

function refreshOrbit() {
  if (isOrbitViewActive()) drawOrbit(performance.now());
  Renderer.ensureLoop();
}

// Hover info cards for the canvas-drawn cities (mirrors drawOrbit's geometry)
orbitCanvas.addEventListener('mousemove', e => {
  if (!Settings.get('tooltips') || !isOrbitViewActive()) return;
  const rect = orbitCanvas.getBoundingClientRect();
  if (rect.width === 0) return;
  const px = (e.clientX - rect.left) * (orbitCanvas.width / rect.width);
  const py = (e.clientY - rect.top) * (orbitCanvas.height / rect.height);
  const w = orbitCanvas.width, h = orbitCanvas.height;
  const maxR = Math.min(w, h) * 0.42;
  const cam = { zoom: 1, tiltY: 0.55 };
  const planetR = maxR * 0.045;
  const cities = buildOrbitCities(maxR, Clock.now());
  let hit = null, best = -Infinity;
  for (const city of cities) {
    const pos = projectCore(w / 2, h / 2, cam, city.orbitPx, city.angle);
    const dx = pos.x - px, dy = pos.y - py;
    const pr = planetR * 1.6;
    if (dx * dx + dy * dy <= pr * pr && pos.depth > best) { hit = city; best = pos.depth; }
  }
  if (hit) showZoneTooltipAt(e.clientX, e.clientY, hit.zone, 'orbit');
  else if (wcTooltipTarget === 'orbit') hideZoneTooltip();
});
orbitCanvas.addEventListener('mouseleave', () => { if (wcTooltipTarget === 'orbit') hideZoneTooltip(); });

Renderer.register('orbit', { when: orbitAnimActive, draw: drawOrbit });
window.addEventListener('resize', () => { if (isOrbitViewActive()) drawOrbit(performance.now()); });

function updateOrbit() {
  drawOrbit(performance.now());
}

// ── Astronomy math ──────────────────────────────────────────────────────────
function solarDaysSinceJ2000(ms) { return (ms - J2000_MS) / 86400000; }

// Log-compressed real orbital spacing: Mercury at 0.18·maxR, Pluto at 1.0·maxR.
function solarOrbitFrac(a) {
  return 0.18 + 0.82 * Math.log(a / 0.387) / Math.log(39.48 / 0.387);
}

// Heliocentric ecliptic longitude in RADIANS: mean longitude plus the
// second-order equation of center (the e² term matters for Pluto, e≈0.25,
// which is ~4.5° off with the first-order term alone).
function solarPlanetAngle(p, ms) {
  const d = solarDaysSinceJ2000(ms);
  const lam = (p.lam0 + 360 * d / p.T) * Math.PI / 180;
  const M = lam - p.peri * Math.PI / 180;
  return lam + 2 * p.e * Math.sin(M) + 1.25 * p.e * p.e * Math.sin(2 * M);
}

// projectCore's y-down screen makes positive angles run clockwise — the view
// from ecliptic SOUTH. Negating gives the canonical counterclockwise view
// from ecliptic north, matching real sky charts and planetarium apps.
function solarScreenAngle(theta) { return -theta; }

// Moon angle as a PURE function of the effective date (deterministic under
// scrub/reverse — no integrator state). Under lapse, fast moons are capped
// at SOLAR_MOON_MAX_REV_PER_SEC by inflating their display period (Phobos at
// true speed would be a 6 rev/s blur); with lapse off, true periods are used.
function solarMoonAngle(moon, ms, lapseOn) {
  const T = Math.abs(moon.T);
  const minT = solarLapseDaysPerSec() / SOLAR_MOON_MAX_REV_PER_SEC; // 5 days at the 2 d/s default
  const Tdisp = lapseOn ? Math.max(T, minT) : T;
  const sign = moon.T < 0 ? -1 : 1;
  const phase = (hashStringToSeed(moon.name) % 360) * Math.PI / 180;
  return sign * 2 * Math.PI * solarDaysSinceJ2000(ms) / Tdisp + phase;
}

function solarCometTheta(ms) {
  return 2 * Math.PI * solarDaysSinceJ2000(ms) / SOLAR_COMET.T + 0.7;
}

// ── Time-lapse accumulator ──────────────────────────────────────────────────
let solarLapseMs = 0;
let solarLastRealMs = null;
let solarMotionSign = 1; // latched direction of effective-date motion (for trails)

function advanceSolarLapse() {
  const realMs = performance.now();
  if (solarLastRealMs !== null) {
    const dtReal = realMs - solarLastRealMs;
    // The sim-time delta comes from INTENT (dtReal × Clock.speed), not from
    // sampling Clock.now() between frames: pump() only counteracts real time
    // on rAF boundaries, so sampled deltas jitter ±a-few-ms around zero while
    // paused — and any −1ms sample would be amplified by K into a visible
    // random-walk of the sim date. Intent gives an exact 0 when paused, and
    // also means a ±24h scrub jump passes through 1:1 instead of being
    // K-amplified into a ±5-year solar leap.
    // Stale-delta CLAMP (not skip): a long real-time gap (other view, hidden
    // tab) contributes at most one 250ms bite instead of leaping years ahead.
    // Clamping rather than skipping matters for reduce-motion users: there
    // the only draw path is the 1Hz tick (dtReal ≈ 1000ms), and a skip-guard
    // would freeze the lapse entirely — the "solar system isn't animating"
    // bug. With the clamp it advances at a gentle quarter rate instead.
    if (Settings.get('solarLapse')) {
      const K = solarLapseDaysPerSec() * 86400;
      solarLapseMs += Math.min(dtReal, 250) * Clock.speed * (K - 1);
    }
  }
  if (Clock.speed !== 0) solarMotionSign = Math.sign(Clock.speed);
  solarLastRealMs = realMs;
}

function solarEffectiveMs() { return Clock.now().getTime() + solarLapseMs; }

}

function drawSolarSun(g, cx, cy, r, now) {
  const flick = effectiveReduceMotion() ? 1 : 1 + 0.03 * Math.sin(now / 1000 * 2.3);
  g.save();
  g.globalCompositeOperation = 'lighter';
  const br = r * 2.7 * flick;
  let grad = g.createRadialGradient(cx, cy, 0, cx, cy, br);
  grad.addColorStop(0,    'rgba(255,200,96,0.51)');
  grad.addColorStop(0.45, 'rgba(255,119,16,0.12)');
  grad.addColorStop(1,    'rgba(255,85,0,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(cx, cy, br, 0, Math.PI * 2); g.fill();
  g.restore();

  grad = g.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0,   'rgba(255,243,176,1)');
  grad.addColorStop(0.6, 'rgba(255,154,30,1)');
  grad.addColorStop(1,   'rgba(255,85,0,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.fill();
}

function drawSolarBelt(g, cx, cy, cam, maxR, effDays) {
  const rand = mulberry32(99);
  const count = Math.min(260, Math.round((solarCanvas.width * solarCanvas.height) / 12000));
  const rot = effDays * 2 * Math.PI / 1682; // whole belt rotates at a Ceres-ish period
  for (let i = 0; i < count; i++) {
    const baseAng = rand() * Math.PI * 2;
    const aAU = 2.2 + rand() * 1.1;
    const rr = solarOrbitFrac(aAU) * maxR + (rand() - 0.5) * maxR * 0.02;
    const alpha = 0.24 + rand() * 0.35;
    const p = projectCore(cx, cy, cam, rr, solarScreenAngle(baseAng + rot));
    g.fillStyle = `rgba(154,140,118,${alpha.toFixed(3)})`;
    g.beginPath(); g.arc(p.x, p.y, 0.9 * solarDpr * cam.zoom * solarSizeK, 0, Math.PI * 2); g.fill();
  }
}

function drawSolarPlanetTrail(g, cx, cy, cam, item) {
  const pts = [];
  for (let i = 0; i < SOLAR_TRAIL_SAMPLES; i++) {
    const thetaPast = item.theta - solarMotionSign * (1 - i / (SOLAR_TRAIL_SAMPLES - 1)) * SOLAR_TRAIL_SPAN;
    pts.push(projectCore(cx, cy, cam, item.orbitPx, solarScreenAngle(thetaPast)));
  }
  drawTaperedTrail(g, pts, item.p.color, item.s * 1.4, 0.4);
}

function drawSolarRing(g, pos, s, color, front) {
  g.save();
  g.translate(pos.x, pos.y);
  g.rotate(-18 * Math.PI / 180);
  const start = (front ? 0 : 180) * Math.PI / 180;
  const end = start + Math.PI;
  g.lineWidth = 2 * solarDpr;
  g.strokeStyle = hexToRgba(color, front ? 0.8 : 0.4);
  g.beginPath(); g.ellipse(0, 0, s * 2.4, s * 0.7, 0, start, end); g.stroke();
  g.lineWidth = solarDpr;
  g.strokeStyle = hexToRgba(color, front ? 0.33 : 0.165);
  g.beginPath(); g.ellipse(0, 0, s * 2.9, s * 0.85, 0, start, end); g.stroke();
  g.restore();
}

function drawSolarMoonOrbits(g, cam, planetPos, p) {
  const seg = 48;
  g.lineWidth = solarDpr;
  g.strokeStyle = 'rgba(85,102,136,0.165)';
  for (const m of p.moons) {
    g.beginPath();
    for (let i = 0; i <= seg; i++) {
      const pt = projectCore(planetPos.x, planetPos.y, cam, m.dist * solarDpr * solarSizeK, (i / seg) * Math.PI * 2);
      if (i === 0) g.moveTo(pt.x, pt.y); else g.lineTo(pt.x, pt.y);
    }
    g.stroke();
  }
}

function drawSolarMoonBodies(g, cam, planetPos, planetDepth, p, effMs, lapseOn, sunX, sunY, back) {
  for (const m of p.moons) {
    const ang = solarScreenAngle(solarMoonAngle(m, effMs, lapseOn));
    const mp = projectCore(planetPos.x, planetPos.y, cam, m.dist * solarDpr * solarSizeK, ang);
    if (back ? mp.depth >= 0 : mp.depth < 0) continue;
    const ms = m.size * solarDpr * cam.zoom * solarSizeK;
    g.fillStyle = m.color;
    g.beginPath(); g.arc(mp.x, mp.y, ms, 0, Math.PI * 2); g.fill();
    const ldx = sunX - mp.x, ldy = sunY - mp.y;
    const llen = Math.hypot(ldx, ldy) || 1;
    shadeSphereDirectional(g, mp.x, mp.y, ms, ldx / llen, ldy / llen);
    solarBodyCache.push({ name: m.name, fact: `Moon of ${p.name}.`, x: mp.x, y: mp.y, r: Math.max(ms, 4 * solarDpr), depth: planetDepth + mp.depth });
  }
}

function drawSolarComet(g, cx, cy, cam, maxR, effMs) {
  const theta = solarCometTheta(effMs);
  const rFrac = (1 - SOLAR_COMET.E * SOLAR_COMET.E) / (1 + SOLAR_COMET.E * Math.cos(theta));
  const pos = projectCore(cx, cy, cam, SOLAR_COMET.A * rFrac * maxR, solarScreenAngle(theta));
  let dx = pos.x - cx, dy = pos.y - cy;
  const len = Math.hypot(dx, dy);
  if (len < 1e-3) return;
  const ux = dx / len, uy = dy / len;
  const scale = solarDpr * cam.zoom * solarSizeK;

  const near = Math.max(0, Math.min(1, ((1 + SOLAR_COMET.E) - rFrac) / (2 * SOLAR_COMET.E)));
  const tailLen = (24 + 78 * near) * scale;
  const headR = 2.6 * scale;
  const tipx = pos.x + ux * tailLen, tipy = pos.y + uy * tailLen;
  const w = headR * 1.7, px = -uy, py = ux;

  g.save();
  g.globalCompositeOperation = 'lighter';
  let grad = g.createLinearGradient(pos.x, pos.y, tipx, tipy);
  grad.addColorStop(0,   'rgba(191,230,255,0.69)');
  grad.addColorStop(0.5, 'rgba(124,192,255,0.25)');
  grad.addColorStop(1,   'rgba(124,192,255,0)');
  g.fillStyle = grad;
  g.beginPath();
  g.moveTo(pos.x + px * w, pos.y + py * w);
  g.lineTo(tipx, tipy);
  g.lineTo(pos.x - px * w, pos.y - py * w);
  g.closePath(); g.fill();

  grad = g.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, headR * 4);
  grad.addColorStop(0, 'rgba(207,236,255,0.75)');
  grad.addColorStop(1, 'rgba(207,236,255,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(pos.x, pos.y, headR * 4, 0, Math.PI * 2); g.fill();
  g.restore();

  g.fillStyle = 'rgba(234,246,255,1)';
  g.beginPath(); g.arc(pos.x, pos.y, headR, 0, Math.PI * 2); g.fill();

  solarBodyCache.push({ name: SOLAR_COMET.name, fact: SOLAR_COMET.fact, x: pos.x, y: pos.y, r: Math.max(headR, 5 * solarDpr), depth: pos.depth });
}

function drawSolarLabel(g, pos, s, name) {
  const k = solarDpr;
  g.font = `${12 * k}px "Segoe UI", sans-serif`;
  g.textAlign = 'center';
  g.textBaseline = 'alphabetic';
  const y = pos.y - s - 6 * k;
  g.fillStyle = 'rgba(0,0,0,0.7)';
  g.fillText(name, pos.x + k, y + k);
  g.fillStyle = 'rgba(234,240,251,0.9)';
  g.fillText(name, pos.x, y);
  g.textAlign = 'left';
}

function drawSolarBodies(g, cx, cy, cam, maxR, nowPerf) {
  const effMs = solarEffectiveMs();
  const lapseOn = Settings.get('solarLapse');
  const sunR = maxR * 0.12;
  const showMoons = Settings.get('solarMoons');
  const showLabels = Settings.get('solarLabels');
  const trailsOn = Settings.get('trails') && !effectiveReduceMotion();

  const items = SOLAR_PLANETS.map(p => {
    const theta = solarPlanetAngle(p, effMs);
    const orbitPx = solarOrbitFrac(p.a) * maxR;
    const pos = projectCore(cx, cy, cam, orbitPx, solarScreenAngle(theta));
    const s = p.size * solarDpr * cam.zoom * solarSizeK;
    return { p, theta, orbitPx, pos, s, depth: pos.depth };
  });
  const order = items.map((_, i) => i);
  for (let i = 1; i < items.length; i++) { // insertion sort: far/back first
    const k = order[i], dk = items[k].depth; let j = i - 1;
    while (j >= 0 && items[order[j]].depth > dk) { order[j + 1] = order[j]; j--; }
    order[j + 1] = k;
  }

  let sunDrawn = false;
  for (let idx = 0; idx < items.length; idx++) {
    const item = items[order[idx]];
    if (!sunDrawn && item.depth >= 0) { drawSolarSun(g, cx, cy, sunR, nowPerf); sunDrawn = true; }

    if (trailsOn) drawSolarPlanetTrail(g, cx, cy, cam, item);
    if (item.p.ring) drawSolarRing(g, item.pos, item.s, item.p.color, false);
    if (showMoons && item.p.moons.length) {
      drawSolarMoonOrbits(g, cam, item.pos, item.p);
      drawSolarMoonBodies(g, cam, item.pos, item.depth, item.p, effMs, lapseOn, cx, cy, true);
    }

    g.fillStyle = item.p.color;
    g.beginPath(); g.arc(item.pos.x, item.pos.y, item.s, 0, Math.PI * 2); g.fill();
    const ldx = cx - item.pos.x, ldy = cy - item.pos.y;
    const llen = Math.hypot(ldx, ldy) || 1;
    shadeSphereDirectional(g, item.pos.x, item.pos.y, item.s, ldx / llen, ldy / llen);

    if (item.p.ring) drawSolarRing(g, item.pos, item.s, item.p.color, true);
    if (showMoons && item.p.moons.length) {
      drawSolarMoonBodies(g, cam, item.pos, item.depth, item.p, effMs, lapseOn, cx, cy, false);
    }
    if (showLabels) drawSolarLabel(g, item.pos, item.s, item.p.name);

    solarBodyCache.push({ name: item.p.name, fact: item.p.fact, x: item.pos.x, y: item.pos.y, r: Math.max(item.s, 5 * solarDpr), depth: item.depth });
  }
  if (!sunDrawn) drawSolarSun(g, cx, cy, sunR, nowPerf);
}

// ── Hover: hit-test against the per-frame body cache ────────────────────────
function solarTryPick() {
  if (!Settings.get('tooltips')) return null;
  const pad = 4 * solarDpr;
  let best = -Infinity, hit = null;
  for (const b of solarBodyCache) {
    const pr = b.r + pad;
    const dx = b.x - SolarPointer.x, dy = b.y - SolarPointer.y;
    if (dx * dx + dy * dy <= pr * pr && b.depth > best) { hit = b; best = b.depth; }
  }
  return hit;
}

function wrapCanvasText(g, text, maxWidth) {
  const lines = []; let cur = '';
  for (const word of text.split(' ')) {
    const trial = cur.length === 0 ? word : cur + ' ' + word;
    if (cur.length > 0 && g.measureText(trial).width > maxWidth) { lines.push(cur); cur = word; }
    else cur = trial;
  }
  if (cur.length > 0) lines.push(cur);
  return lines;
}

function traceRoundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}

function drawSolarTooltip(g, hover) {
  const k = solarDpr; // all sizes device-px (no dpr transform on the canvas)
  const titleFont = `700 ${14 * k}px "Segoe UI", sans-serif`;
  const bodyFont = `${12 * k}px "Segoe UI", sans-serif`;
  const maxW = 240 * k;
  const W = solarCanvas.width, H = solarCanvas.height;

  g.textBaseline = 'alphabetic'; g.textAlign = 'left';
  g.font = bodyFont;
  const lines = wrapCanvasText(g, hover.fact, maxW);
  g.font = titleFont;
  let contentW = g.measureText(hover.name).width;
  g.font = bodyFont;
  for (const ln of lines) contentW = Math.max(contentW, g.measureText(ln).width);
  const boxW = Math.min(maxW + 20 * k, contentW + 20 * k);
  const lineH = 16 * k;
  const boxH = 14 * k + 18 * k + lines.length * lineH + 6 * k;

  let bx = hover.x + hover.r + 12 * k;
  let by = hover.y - boxH / 2;
  if (bx + boxW > W - 8 * k) bx = hover.x - hover.r - 12 * k - boxW;
  bx = Math.max(8 * k, Math.min(bx, Math.max(8 * k, W - boxW - 8 * k)));
  by = Math.max(8 * k, Math.min(by, Math.max(8 * k, H - boxH - 8 * k)));

  traceRoundRect(g, bx, by, boxW, boxH, 8 * k);
  g.fillStyle = 'rgba(12,18,32,0.93)'; g.fill();
  g.strokeStyle = 'rgba(58,77,110,1)'; g.lineWidth = k; g.stroke();

  const tx = bx + 10 * k; let ty = by + 20 * k;
  g.fillStyle = '#fff'; g.font = titleFont;
  g.fillText(hover.name, tx, ty);
  ty += 20 * k;
  g.font = bodyFont; g.fillStyle = 'rgba(199,210,230,1)';
  for (const ln of lines) { g.fillText(ln, tx, ty); ty += lineH; }
}

function drawSolarHoverOverlay(g) {
  SolarPointer.hover = (SolarPointer.inside && !SolarPointer.dragging) ? solarTryPick() : null;
  solarCanvas.classList.toggle('hovering', !!SolarPointer.hover && !SolarPointer.dragging);
  if (!SolarPointer.hover) return;
  const h = SolarPointer.hover;
  g.strokeStyle = 'rgba(255,255,255,0.8)';
  g.lineWidth = 1.5 * solarDpr;
  g.beginPath(); g.arc(h.x, h.y, h.r + 5 * solarDpr, 0, Math.PI * 2); g.stroke();
  drawSolarTooltip(g, h);
}

// ── Main draw ───────────────────────────────────────────────────────────────
function drawSolar(now) {
  solarDpr = sizeCanvas(solarCanvas);
  const w = solarCanvas.width, h = solarCanvas.height;
  solarCtx.clearRect(0, 0, w, h); // transparent — the shared page starfield shows through
  if (w === 0 || h === 0) return;
  advanceSolarLapse();

  const cam = SolarCam;
  const cx = w / 2 + cam.panX, cy = h / 2 + cam.panY;
  // Size from BOTH axes: the tilt squashes the system vertically (outer ring
  // height = 2·maxR·0.55), so width can carry far more than min(w,h) — on a
  // 16:9 window this nearly doubles the system vs the old min(w,h)·0.44.
  const maxR = Math.min(w * 0.46, h * 0.78);
  solarMaxRLast = maxR;
  // Bodies keep the demo's px sizes at small maxR but grow with the system
  // so they don't look lost on the larger rings.
  solarSizeK = Math.min(2.2, Math.max(1, maxR / (280 * solarDpr)));
  const effMs = solarEffectiveMs();
  solarBodyCache = [];

  drawSolarClockBackdrop(solarCtx, w, h);

  if (Settings.get('solarOrbits')) {
    for (const p of SOLAR_PLANETS) {
      strokeOrbitRing(solarCtx, cx, cy, cam, solarOrbitFrac(p.a) * maxR, {
        dashed: p.dwarf, lineWidth: solarDpr,
        strokeStyle: p.dwarf ? 'rgba(51,68,102,0.29)' : 'rgba(51,68,102,0.4)',
      });
    }
  }
  if (Settings.get('solarBelt')) drawSolarBelt(solarCtx, cx, cy, cam, maxR, solarDaysSinceJ2000(effMs));
  drawSolarBodies(solarCtx, cx, cy, cam, maxR, now);
  drawSolarComet(solarCtx, cx, cy, cam, maxR, effMs);
  drawSolarHoverOverlay(solarCtx);
}

function solarAnimActive() {
  return isSolarViewActive() && !effectiveReduceMotion();
}

function refreshSolar() {
  if (isSolarViewActive()) drawSolar(performance.now());
  Renderer.ensureLoop();
}

function updateSolar() {
  drawSolar(performance.now());
}

Renderer.register('solar', { when: solarAnimActive, draw: drawSolar });
window.addEventListener('resize', () => { if (isSolarViewActive()) drawSolar(performance.now()); });

// ── Pointer interaction: wheel zoom, drag pan, dblclick reset, hover ────────
function solarPointerPos(e) {
  const r = solarCanvas.getBoundingClientRect();
  if (r.width === 0) return { x: 0, y: 0 };
  return {
    x: (e.clientX - r.left) * (solarCanvas.width / r.width),
    y: (e.clientY - r.top) * (solarCanvas.height / r.height),
  };
}

// Redraw for pointer feedback when the rAF loop isn't running (reduce-motion)
function solarInteractionRedraw() {
  if (isSolarViewActive() && !solarAnimActive()) drawSolar(performance.now());
}

solarCanvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  SolarPointer.dragging = true;
  SolarPointer.dragLast = solarPointerPos(e);
  solarCanvas.setPointerCapture(e.pointerId);
  solarCanvas.classList.add('dragging');
});
solarCanvas.addEventListener('pointermove', e => {
  const p = solarPointerPos(e);
  SolarPointer.x = p.x; SolarPointer.y = p.y; SolarPointer.inside = true;
  if (SolarPointer.dragging) {
    SolarCam.panX += p.x - SolarPointer.dragLast.x;
    SolarCam.panY += p.y - SolarPointer.dragLast.y;
    SolarPointer.dragLast = p;
  }
  solarInteractionRedraw();
});
function solarEndDrag() {
  SolarPointer.dragging = false;
  solarCanvas.classList.remove('dragging');
}
solarCanvas.addEventListener('pointerup', solarEndDrag);
solarCanvas.addEventListener('pointercancel', solarEndDrag);
solarCanvas.addEventListener('pointerleave', () => {
  SolarPointer.inside = false; SolarPointer.hover = null;
  solarCanvas.classList.remove('hovering');
  solarInteractionRedraw();
});
solarCanvas.addEventListener('wheel', e => {
  e.preventDefault(); // scoped to the canvas — page scroll elsewhere unaffected
  const p = solarPointerPos(e);
  const baseX = solarCanvas.width / 2, baseY = solarCanvas.height / 2;
  const cx = baseX + SolarCam.panX, cy = baseY + SolarCam.panY;
  const z0 = SolarCam.zoom;
  const z1 = Math.max(0.4, Math.min(12, z0 * (e.deltaY < 0 ? 1.1 : 1 / 1.1)));
  const k = z1 / z0;
  SolarCam.panX = (p.x - (p.x - cx) * k) - baseX;
  SolarCam.panY = (p.y - (p.y - cy) * k) - baseY;
  SolarCam.zoom = z1;
  solarInteractionRedraw();
}, { passive: false });
solarCanvas.addEventListener('dblclick', () => {
  SolarCam.zoom = 1; SolarCam.panX = 0; SolarCam.panY = 0;
  solarInteractionRedraw();
});

// ── Main Tick ──
function tick() {
  checkCometTrigger();
  switch (activeView) {
    case 'flip':    updateFlip(); break;
    case 'analog':  updateAnalog(); break;
    case 'globe':   updateGlobe(); break;
    case 'map':     updateMap(); break;
    case 'horizon': updateHorizon(); break;
    case 'orbit':   updateOrbit(); break;
    case 'solar':   updateSolar(); break;
  }
  refreshTimeHud();
}
tick();
setInterval(tick, 1000);

// Restore saved view
const saved = localStorage.getItem('worldclock-view');
if (saved) switchView(saved);
</script>
